name: Build Android APK

on:
  push:
    branches: [main]
    paths: [index.html, android/**, .github/workflows/build-apk.yml]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/app/release.keystore -alias gm \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GM,OU=Dev,O=GM,L=SG,C=SG"

      - name: Copy game to assets
        run: cp index.html android/app/src/main/assets/

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: GalacticMiner
          path: android/app/build/outputs/apk/release/*.apk
