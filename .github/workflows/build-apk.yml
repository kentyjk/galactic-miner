name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with: {cmdline-tools-version: '11076708'}

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias gm \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GM,OU=Dev,O=GM,L=SG,C=SG"

      - name: Create Android project
        run: |
          APP=com.galacticminer.app
          mkdir -p app/src/main/java/com/galacticminer/app
          mkdir -p app/src/main/res/values app/src/main/assets

          # Copy game + assets into app
          cp index.html app/src/main/assets/
          cp manifest.json sw.js app/src/main/assets/ 2>/dev/null || true
          cp icon-512.png app/src/main/res/drawable/ic_launcher.png 2>/dev/null || true

          # MainActivity with WebView
          cat > app/src/main/java/com/galacticminer/app/MainActivity.java << 'JAVA'
          package com.galacticminer.app;
          import android.app.Activity; import android.os.Bundle;
          import android.webkit.WebView; import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              public void onCreate(Bundle s) {
                  super.onCreate(s);
                  WebView w = new WebView(this);
                  WebSettings ws = w.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  w.setWebChromeClient(new WebChromeClient());
                  w.loadUrl("file:///android_asset/index.html");
                  setContentView(w);
              }
          }
          JAVA

          # AndroidManifest
          cat > app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="Galactic Miner" android:icon="@drawable/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          # build.gradle (root)
          echo 'buildscript{repositories{google();mavenCentral()};dependencies{classpath"com.android.tools.build:gradle:8.2.0"}}' > build.gradle

          # app/build.gradle
          cat > app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.galacticminer.app'; compileSdk 34
              defaultConfig { applicationId "com.galacticminer.app"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
              signingConfigs { release { storeFile file('../release.keystore'); storePassword 'android'; keyAlias 'gm'; keyPassword 'android' } }
              buildTypes { release { signingConfig signingConfigs.release; minifyEnabled false } }
          }
          GRADLE

          echo "rootProject.name='GalacticMiner'" > settings.gradle
          echo 'include :app' >> settings.gradle
          echo 'android.useAndroidX=true' > gradle.properties

      - name: Build APK
        run: gradle wrapper && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galactic-miner-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
