name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore release.keystore -alias galacticminer \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Galactic Miner, OU=Dev, O=GM, L=SG, ST=SG, C=SG"

      - name: Initialize TWA
        run: |
          echo "n" | bubblewrap init --manifest https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json

      - name: Build APK
        run: |
          cd app && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galactic-miner-apk
          path: app/build/outputs/apk/release/*.apk
